<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="curPos" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
    <radialGradient id="validMove" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>

  <!-- Grid dots: 4×4 at x/y ∈ {5, 12, 19, 26} -->
  <g fill="#2d4a6a" opacity="0.8">
    <circle cx="5"  cy="5"  r="1"/> <circle cx="12" cy="5"  r="1"/>
    <circle cx="19" cy="5"  r="1"/> <circle cx="26" cy="5"  r="1"/>
    <circle cx="5"  cy="12" r="1"/> <circle cx="12" cy="12" r="1"/>
    <circle cx="19" cy="12" r="1"/> <circle cx="26" cy="12" r="1"/>
    <circle cx="5"  cy="19" r="1"/> <circle cx="12" cy="19" r="1"/>
    <circle cx="19" cy="19" r="1"/> <circle cx="26" cy="19" r="1"/>
    <circle cx="5"  cy="26" r="1"/> <circle cx="12" cy="26" r="1"/>
    <circle cx="19" cy="26" r="1"/> <circle cx="26" cy="26" r="1"/>
  </g>

  <!-- Historical path segment (faded blue) -->
  <line x1="5" y1="26" x2="12" y2="19"
        stroke="#1d4ed8" stroke-width="1.5"
        stroke-linecap="round" opacity="0.55"/>

  <!-- Recent path segment (bright blue) -->
  <line x1="12" y1="19" x2="19" y2="12"
        stroke="#3b82f6" stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Velocity vector shaft (green) — stops before arrowhead -->
  <line x1="19" y1="12" x2="23.5" y2="7.5"
        stroke="#22c55e" stroke-width="2"
        stroke-linecap="round"/>

  <!-- Arrowhead pointing toward (26,5) along the (+1,−1) diagonal -->
  <!-- tip=(26,5)  base-left≈(25,9)  base-right≈(22,6) -->
  <polygon points="26,5 24.8,8.8 21.8,6.2" fill="#22c55e"/>

  <!-- Start position -->
  <circle cx="5"  cy="26" r="2"   fill="#1d4ed8"/>

  <!-- Intermediate position -->
  <circle cx="12" cy="19" r="1.6" fill="#2563eb"/>

  <!-- Current position — glowing blue -->
  <circle cx="19" cy="12" r="3"   fill="#1e40af" opacity="0.35"/>
  <circle cx="19" cy="12" r="2.2" fill="url(#curPos)"/>

  <!-- Valid-move target — glowing green -->
  <circle cx="26" cy="5"  r="3"   fill="#15803d" opacity="0.3"/>
  <circle cx="26" cy="5"  r="2"   fill="url(#validMove)"/>
</svg>

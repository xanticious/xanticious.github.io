<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Element card background (transition-metal blue) -->
  <rect width="32" height="32" rx="5" fill="#2277dd"/>
  <!-- Inner border highlight -->
  <rect x="2" y="2" width="28" height="28" rx="3.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Atomic number top-left -->
  <text x="4" y="9" font-family="Arial, Helvetica, sans-serif" font-size="6.5" font-weight="700" fill="rgba(255,255,255,0.85)">78</text>
  <!-- Element symbol -->
  <text x="16" y="22" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="auto">Pt</text>
  <!-- Element name -->
  <text x="16" y="29.5" font-family="Arial, Helvetica, sans-serif" font-size="4.5" fill="rgba(255,255,255,0.75)" text-anchor="middle">platinum</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Brand violet background -->
  <rect width="32" height="32" rx="7" fill="#5C40D9"/>
  <!-- Die face -->
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#FAFAF8"/>
  <!-- Five-dot (quincunx) pattern -->
  <circle cx="10" cy="10" r="2.5" fill="#5C40D9"/>
  <circle cx="22" cy="10" r="2.5" fill="#5C40D9"/>
  <circle cx="16" cy="16" r="2.5" fill="#5C40D9"/>
  <circle cx="10" cy="22" r="2.5" fill="#5C40D9"/>
  <circle cx="22" cy="22" r="2.5" fill="#5C40D9"/>
</svg>
